# Formatting is enforced on the pinned stable toolchain, so only stable rustfmt
# options are set here. Import-grouping options (`imports_granularity`,
# `group_imports`) are nightly-only; they are intentionally omitted so that
# `cargo fmt --check` stays clean under the pinned stable toolchain.
edition = "2024"
max_width = 100
newline_style = "Unix"
# Keep a `let ... else { return };` guard on one line up to the full line width. The
# tests use this idiom to bind a fixture without `unwrap`/`expect`; collapsing it onto a
# single line keeps the executed `let` line counted by the coverage gate (only the never-
# taken divergent branch stays an uncovered region, which the gate does not measure).
single_line_let_else_max_width = 100
