name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: the whole workflow is read-only. No job widens this scope.
permissions:
  contents: read

# Cancel superseded runs for the same ref so only the latest commit is verified.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Actions are pinned to a full commit SHA (an immutable supply-chain anchor — a
# moved tag cannot inject code); the trailing `# vX.Y.Z` is the human-readable
# version, kept current by Dependabot's github-actions updates.
jobs:
  fmt:
    name: format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - run: cargo build --workspace --all-features --locked
      - run: cargo test --workspace --all-features --locked

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: cargo-llvm-cov
      - name: Coverage (LCOV)
        run: |
          set -euo pipefail
          cov_err="$(mktemp)"
          # Until the crates carry coverable code, the instrumented stubs produce no
          # profile data and llvm-cov reports "no coverage data found". Tolerate only
          # that specific empty-workspace state (emitting an empty report); any other
          # failure fails the job. This becomes a normal coverage gate the moment the
          # crates gain functions and tests.
          if cargo llvm-cov --workspace --all-features --locked --lcov --output-path lcov.info 2> "$cov_err"; then
            cat "$cov_err" >&2 || true
          elif grep -q 'no coverage data found' "$cov_err"; then
            cat "$cov_err" >&2
            echo 'note: no coverable code yet (empty stubs); emitting an empty LCOV.'
            : > lcov.info
          else
            cat "$cov_err" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: lcov
          path: lcov.info

  supply-chain:
    name: supply-chain (deny / audit / vet)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: cargo-deny,cargo-audit
      # `install-action` ships the latest cargo-vet *release binary* (0.10.0), which is
      # too old to parse the publisher-trust / audit schema produced by current
      # cargo-vet and the imported audit sets. Pin a compatible version, built from
      # source so it does not depend on a prebuilt binary existing for that release.
      - run: cargo install --locked cargo-vet@0.10.2
      - run: cargo deny check                 # ban-list + licenses + advisories + sources
      - run: cargo audit                      # RustSec advisories against Cargo.lock
      - run: cargo vet                         # every dependency audited or trusted-imported

  msrv:
    name: msrv (1.90)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Install the support floor alongside the pinned dev toolchain. `cargo +1.90`
      # below selects it explicitly, overriding rust-toolchain.toml so the build
      # actually proves the declared MSRV (`rust-version = "1.90"`).
      - name: Install the MSRV toolchain
        run: rustup toolchain install 1.90 --profile minimal --no-self-update
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo +1.90 build --workspace --locked

  wasm:
    name: wasm build-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        with:
          target: wasm32-unknown-unknown
      # The edge binding must compile wasm-clean — no tokio / std-net leakage.
      - run: cargo build -p bymax-auth-wasm --target wasm32-unknown-unknown --locked
