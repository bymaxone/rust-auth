name: Feature request
description: Propose a new capability or an improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please check the "What Is NOT in the Library" scope
        boundaries (technical specification § 22) first — some capabilities are
        intentionally the host application's responsibility.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve? What can you not do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you would like, and how it fits the existing surface.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you currently use or other designs you weighed.
    validations:
      required: false
