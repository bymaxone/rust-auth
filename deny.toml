# Supply-chain policy for the workspace, enforced by `cargo deny check` in CI
# (advisories + licenses + bans + sources). See the technical specification §19.6
# for the rationale behind each rule.

[graph]
# Resolve with every feature enabled so the gate sees the full dependency graph,
# not just the default-feature subset.
all-features = true

[advisories]
# A new RustSec advisory against the committed Cargo.lock fails CI. Vulnerability
# and unsound advisories are always denied by cargo-deny and cannot be weakened
# here, so only the configurable knobs are set: `unmaintained = "all"` flags every
# unmaintained crate (not just workspace-direct ones), and yanked versions are
# errors. `ignore` records intentional, reviewed exceptions (none yet).
unmaintained = "all"
yanked = "deny"
ignore = []

[licenses]
# Permissive licenses only. Every copyleft family (GPL/AGPL/LGPL/MPL) is denied by
# omission, and an unlisted license fails closed.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    # Boost Software License 1.0 — an OSI-approved, GPL-compatible permissive license
    # (no binary-distribution attribution requirement), strictly more permissive than
    # MIT. Pulled by `xxhash-rust` (a transitive dependency of the `redis` client).
    "BSL-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    # zlib License — OSI-approved, FSF Free/Libre, strictly more permissive than MIT (no
    # attribution requirement on binary distribution). Pulled by `foldhash` (a transitive
    # dependency of `hashbrown` under the `governor` rate limiter).
    "Zlib",
]
confidence-threshold = 0.9

[bans]
# Graph bloat is a supply-chain smell: a second semver-major copy of any crate fails.
multiple-versions = "deny"
# A `*` version requirement is too imprecise for a security-sensitive graph.
wildcards = "deny"
deny = [
    { crate = "openssl", reason = "TLS is rustls; no OpenSSL on any path (spec §19.6 ban-list)." },
    { crate = "openssl-sys", reason = "C OpenSSL bindings are banned — preserves the zero-native-binding posture." },
    { crate = "ring", reason = "ring breaks the wasm32 edge build and is non-RustCrypto; RustCrypto is the crypto policy (spec §19.6)." },
]
# Duplicate-version exceptions, all confined to the Axum adapter's mandated edge
# dependencies and reviewed individually. The first-party RustCrypto stack stays on its
# own `rand 0.8` / `getrandom 0.2` / `rand_core 0.6` line; the extra majors below are
# pulled ONLY by the rate limiter (`tower_governor` → `governor`, plus its
# `forwarded-header-value` → `thiserror 1`) and the WebSocket upgrade transport
# (`axum`'s `ws` feature → `tokio-tungstenite` → `tungstenite`). None reaches the
# wasm-targeted `types`/`crypto`/`jwt` crates, so the edge build is unaffected; they are
# server-only and non-cryptographic on the auth hot path.
skip = []
# The rate-limiter and WebSocket transport bring their own `rand`/`getrandom`/`hashbrown`
# majors; skipping their subtrees keeps the duplicate count from those leaves out of the
# gate without masking a duplicate anywhere on the first-party crypto path.
skip-tree = [
    { crate = "governor@0.10", reason = "GCRA rate limiter behind tower_governor; pulls rand 0.9 / getrandom 0.3 / dashmap+hashbrown 0.14, all server-only." },
    { crate = "tungstenite@0.29", reason = "axum `ws` WebSocket transport; pulls rand 0.9 for the masking key, server-only and never on the crypto/edge path." },
]

[sources]
# crates.io only — no git dependencies, no vendored or unknown registries.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
